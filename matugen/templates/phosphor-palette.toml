#
# Phosphor palette — matugen template.
#
# Renders a PlasmaZones Phosphor-structured palette from a user wallpaper
# via matugen's Material You engine.  Drop this file under
# ~/.config/matugen/templates/ and wire it up in matugen's config:
#
#   [templates.plasmazones]
#   input_path  = "~/.config/matugen/templates/phosphor-palette.toml"
#   output_path = "~/.config/plasmazones/palette.toml"
#
# Then `matugen image <wallpaper>` will regenerate this palette with
# the same role structure as data/palettes/phosphor.toml but seeded
# from the wallpaper's dominant hues.  The resulting file is a
# drop-in replacement for the static brand palette.

[meta]
name        = "Phosphor"
description = "PlasmaZones palette — regenerated by matugen from wallpaper."
source      = "matugen"
scheme_type = "{{ scheme.type | default(value='tonal-spot') }}"

# ── Brand slots ─────────────────────────────────────────────────────────────
# The four signature accents map to matugen's four primary chroma roles;
# the three background shades come from surface / surface-container /
# background.  This preserves the cyan → blue → purple → rose sweep on
# whichever wallpaper the user is currently showing.
[brand]
cyan   = "{{colors.tertiary.default.hex}}"
blue   = "{{colors.primary.default.hex}}"
purple = "{{colors.secondary.default.hex}}"
rose   = "{{colors.error.default.hex}}"
navy   = "{{colors.surface.default.hex}}"
abyss  = "{{colors.surface_container.default.hex}}"
void   = "{{colors.background.default.hex}}"

# ── Material You roles — matugen-authoritative ──────────────────────────────
# Matugen already computes both light and dark tonal palettes; we emit
# both so apps can switch without re-running matugen.
[roles.dark]
primary                = "{{colors.primary.dark.hex}}"
on_primary             = "{{colors.on_primary.dark.hex}}"
primary_container      = "{{colors.primary_container.dark.hex}}"
on_primary_container   = "{{colors.on_primary_container.dark.hex}}"
inverse_primary        = "{{colors.inverse_primary.dark.hex}}"

secondary              = "{{colors.secondary.dark.hex}}"
on_secondary           = "{{colors.on_secondary.dark.hex}}"
secondary_container    = "{{colors.secondary_container.dark.hex}}"
on_secondary_container = "{{colors.on_secondary_container.dark.hex}}"

tertiary               = "{{colors.tertiary.dark.hex}}"
on_tertiary            = "{{colors.on_tertiary.dark.hex}}"
tertiary_container     = "{{colors.tertiary_container.dark.hex}}"
on_tertiary_container  = "{{colors.on_tertiary_container.dark.hex}}"

error                  = "{{colors.error.dark.hex}}"
on_error               = "{{colors.on_error.dark.hex}}"
error_container        = "{{colors.error_container.dark.hex}}"
on_error_container     = "{{colors.on_error_container.dark.hex}}"

background             = "{{colors.background.dark.hex}}"
on_background          = "{{colors.on_background.dark.hex}}"
surface                = "{{colors.surface.dark.hex}}"
on_surface             = "{{colors.on_surface.dark.hex}}"
surface_variant        = "{{colors.surface_variant.dark.hex}}"
on_surface_variant     = "{{colors.on_surface_variant.dark.hex}}"
surface_container      = "{{colors.surface_container.dark.hex}}"
surface_container_low  = "{{colors.surface_container_low.dark.hex}}"
surface_container_high = "{{colors.surface_container_high.dark.hex}}"
surface_tint           = "{{colors.surface_tint.dark.hex}}"
inverse_surface        = "{{colors.inverse_surface.dark.hex}}"
inverse_on_surface     = "{{colors.inverse_on_surface.dark.hex}}"

outline                = "{{colors.outline.dark.hex}}"
outline_variant        = "{{colors.outline_variant.dark.hex}}"
shadow                 = "{{colors.shadow.dark.hex}}"
scrim                  = "{{colors.scrim.dark.hex}}"

[roles.light]
primary                = "{{colors.primary.light.hex}}"
on_primary             = "{{colors.on_primary.light.hex}}"
primary_container      = "{{colors.primary_container.light.hex}}"
on_primary_container   = "{{colors.on_primary_container.light.hex}}"
inverse_primary        = "{{colors.inverse_primary.light.hex}}"

secondary              = "{{colors.secondary.light.hex}}"
on_secondary           = "{{colors.on_secondary.light.hex}}"
secondary_container    = "{{colors.secondary_container.light.hex}}"
on_secondary_container = "{{colors.on_secondary_container.light.hex}}"

tertiary               = "{{colors.tertiary.light.hex}}"
on_tertiary            = "{{colors.on_tertiary.light.hex}}"
tertiary_container     = "{{colors.tertiary_container.light.hex}}"
on_tertiary_container  = "{{colors.on_tertiary_container.light.hex}}"

error                  = "{{colors.error.light.hex}}"
on_error               = "{{colors.on_error.light.hex}}"
error_container        = "{{colors.error_container.light.hex}}"
on_error_container     = "{{colors.on_error_container.light.hex}}"

background             = "{{colors.background.light.hex}}"
on_background          = "{{colors.on_background.light.hex}}"
surface                = "{{colors.surface.light.hex}}"
on_surface             = "{{colors.on_surface.light.hex}}"
surface_variant        = "{{colors.surface_variant.light.hex}}"
on_surface_variant     = "{{colors.on_surface_variant.light.hex}}"
surface_container      = "{{colors.surface_container.light.hex}}"
surface_container_low  = "{{colors.surface_container_low.light.hex}}"
surface_container_high = "{{colors.surface_container_high.light.hex}}"
surface_tint           = "{{colors.surface_tint.light.hex}}"
inverse_surface        = "{{colors.inverse_surface.light.hex}}"
inverse_on_surface     = "{{colors.inverse_on_surface.light.hex}}"

outline                = "{{colors.outline.light.hex}}"
outline_variant        = "{{colors.outline_variant.light.hex}}"
shadow                 = "{{colors.shadow.light.hex}}"
scrim                  = "{{colors.scrim.light.hex}}"

# ── PlasmaZones-specific roles (dark) ───────────────────────────────────────
# Alpha-composited variants ready to drop into zone defaults or shader
# customColors.  The four-color accent gradient mirrors the logo sweep
# (tertiary → primary → secondary → error) against whichever wallpaper
# hues matugen picked.
[plasmazones.dark]
zone_highlight  = "{{colors.primary.dark.hex}}80"
zone_inactive   = "{{colors.on_surface_variant.dark.hex}}40"
zone_border     = "{{colors.tertiary.dark.hex}}C8"
zone_label      = "{{colors.on_surface.dark.hex}}FF"
overlay_scrim   = "{{colors.background.dark.hex}}B3"
accent_gradient = [
    "{{colors.tertiary.dark.hex}}",
    "{{colors.primary.dark.hex}}",
    "{{colors.secondary.dark.hex}}",
    "{{colors.error.dark.hex}}",
]

[plasmazones.light]
zone_highlight  = "{{colors.primary.light.hex}}80"
zone_inactive   = "{{colors.on_surface_variant.light.hex}}40"
zone_border     = "{{colors.tertiary.light.hex}}C8"
zone_label      = "{{colors.on_surface.light.hex}}FF"
overlay_scrim   = "{{colors.surface.light.hex}}B3"
accent_gradient = [
    "{{colors.tertiary.light.hex}}",
    "{{colors.primary.light.hex}}",
    "{{colors.secondary.light.hex}}",
    "{{colors.error.light.hex}}",
]

# ── ANSI 16-color export (pywal compatibility) ──────────────────────────────
# Approximate matugen's M3 roles to ANSI slots.  Green and yellow are not
# first-class matugen roles; we derive them from tertiary/secondary tonal
# shifts — imperfect, but keeps the 16-color surface populated so
# terminal emulators still pick up a cohesive scheme.
[ansi]
color0  = "{{colors.background.dark.hex}}"
color1  = "{{colors.error.dark.hex}}"
color2  = "{{colors.tertiary.dark.hex}}"
color3  = "{{colors.secondary_container.dark.hex}}"
color4  = "{{colors.primary.dark.hex}}"
color5  = "{{colors.secondary.dark.hex}}"
color6  = "{{colors.tertiary_container.dark.hex}}"
color7  = "{{colors.on_surface_variant.dark.hex}}"
color8  = "{{colors.surface_variant.dark.hex}}"
color9  = "{{colors.error_container.dark.hex}}"
color10 = "{{colors.tertiary.light.hex}}"
color11 = "{{colors.on_secondary_container.dark.hex}}"
color12 = "{{colors.inverse_primary.dark.hex}}"
color13 = "{{colors.on_secondary_container.light.hex}}"
color14 = "{{colors.tertiary.light.hex}}"
color15 = "{{colors.on_surface.dark.hex}}"
background = "{{colors.background.dark.hex}}"
foreground = "{{colors.on_background.dark.hex}}"
cursor     = "{{colors.tertiary.dark.hex}}"
